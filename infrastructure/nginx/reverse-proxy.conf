# =============================================================================
# VayuGuard - Nginx Reverse Proxy Configuration
# =============================================================================
# Upstream definitions, path-based routing, WebSocket support, rate limiting
# =============================================================================

# ---------- Upstream Definitions ----------
upstream backend_api {
    server backend:5000;
    # Least connections for balanced load distribution
    least_conn;
    keepalive 64;
}

upstream ml_service {
    server ml-service:8000;
    least_conn;
    keepalive 32;
}

upstream frontend_app {
    server frontend:3000;
    least_conn;
    keepalive 64;
}

# ---------- Rate Limiting Zones ----------
# General API rate limit: 100 requests per second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

# ML prediction endpoint: 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=ml_limit:10m rate=10r/s;

# Authentication endpoints: 5 requests per second per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---------- Shared SSL Settings ----------
ssl_certificate     /etc/nginx/ssl/tls.crt;
ssl_certificate_key /etc/nginx/ssl/tls.key;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers on;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;

# ---------- Security Headers ----------
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss: https:;" always;

# ---------- Server Block ----------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vayuguard.com app.vayuguard.com;

    # Maximum request body size (for file uploads)
    client_max_body_size 50m;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;

    # Connection limits
    limit_conn conn_limit 50;

    # ===== Authentication API Routes =====
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ===== Backend API Routes =====
    location /api/v1/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Caching for read-heavy endpoints
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
    }

    # ===== ML Service API Routes =====
    location /api/ml/ {
        limit_req zone=ml_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://ml_service/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Longer timeout for ML predictions
        proxy_read_timeout 300s;
    }

    # ===== WebSocket Support =====
    location /ws/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket keep-alive settings
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ===== Health Check Endpoint =====
    location /healthz {
        proxy_pass http://backend_api/api/v1/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # ===== Metrics Endpoint (internal only) =====
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://backend_api/metrics;
        proxy_http_version 1.1;
        access_log off;
    }

    # ===== Frontend (Default Route) =====
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Next.js static files with long cache
        location /_next/static/ {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ===== Custom Error Pages =====
    error_page 429 /429.html;
    error_page 502 503 504 /50x.html;

    location = /429.html {
        internal;
        default_type application/json;
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
    }

    location = /50x.html {
        internal;
        default_type application/json;
        return 503 '{"error":"Service Unavailable","message":"The server is temporarily unavailable. Please try again later."}';
    }
}

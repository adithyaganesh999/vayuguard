apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: vayuguard-ingress

spec:
  ingressClassName: nginx

  rules:
  - http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 5000

      - path: /ml
        pathType: Prefix
        backend:
          service:
            name: ml-service
            port:
              number: 8000
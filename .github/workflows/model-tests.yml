name: Model Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'ml-service/**'
      - 'data-pipeline/**'

concurrency:
  group: model-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  model-unit-tests:
    name: Model Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run model tests
        run: |
          python -m pytest tests/test_models.py -v \
            --cov=models \
            --cov-report=term-missing \
            --cov-report=xml:coverage-models.xml \
            --junitxml=test-results-models.xml

      - name: Run inference tests
        run: |
          python -m pytest tests/test_inference.py -v \
            --cov=inference \
            --cov-report=term-missing \
            --cov-report=xml:coverage-inference.xml \
            --junitxml=test-results-inference.xml

      - name: Run feature pipeline tests
        run: |
          python -m pytest tests/test_feature_pipeline.py -v \
            --cov=feature_pipeline \
            --cov-report=term-missing \
            --junitxml=test-results-features.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-test-results
          path: |
            ml-service/coverage-*.xml
            ml-service/test-results-*.xml

  check-accuracy-threshold:
    name: Check Model Accuracy Threshold
    runs-on: ubuntu-latest
    needs: model-unit-tests
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest numpy pandas scikit-learn

      - name: Run backtest with accuracy check
        env:
          ACCURACY_THRESHOLD_MAE: 15.0
          ACCURACY_THRESHOLD_RMSE: 25.0
          ACCURACY_THRESHOLD_R2: 0.80
        run: |
          python scripts/backtest.py \
            --model-type ensemble \
            --days 30 \
            --threshold-mae $ACCURACY_THRESHOLD_MAE \
            --threshold-rmse $ACCURACY_THRESHOLD_RMSE \
            --threshold-r2 $ACCURACY_THRESHOLD_R2 \
            --output-format json \
            --output-file backtest-results.json

      - name: Validate accuracy thresholds
        run: |
          python -c "
          import json
          import sys

          with open('backtest-results.json') as f:
              results = json.load(f)

          failed = False
          for model_name, metrics in results['models'].items():
              mae = metrics.get('mae', float('inf'))
              rmse = metrics.get('rmse', float('inf'))
              r2 = metrics.get('r2', 0)

              print(f'Model: {model_name}')
              print(f'  MAE:  {mae:.2f} (threshold: 15.00)')
              print(f'  RMSE: {rmse:.2f} (threshold: 25.00)')
              print(f'  R2:   {r2:.4f} (threshold: 0.8000)')

              if mae > 15.0:
                  print(f'  ❌ MAE exceeds threshold!')
                  failed = True
              elif rmse > 25.0:
                  print(f'  ❌ RMSE exceeds threshold!')
                  failed = True
              elif r2 < 0.80:
                  print(f'  ❌ R2 below threshold!')
                  failed = True
              else:
                  print(f'  ✅ All thresholds met')

          if failed:
              print('\n❌ Model accuracy check FAILED')
              sys.exit(1)
          else:
              print('\n✅ All model accuracy checks PASSED')
          "

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results
          path: ml-service/backtest-results.json

  model-integration-tests:
    name: Model Integration Tests
    runs-on: ubuntu-latest
    needs: check-accuracy-threshold
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py -v \
            --cov \
            --cov-report=term-missing

  notify-on-failure:
    name: Notify on Model Test Failure
    runs-on: ubuntu-latest
    needs: [model-unit-tests, check-accuracy-threshold, model-integration-tests]
    if: failure()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "⚠️ ML Model tests failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ *ML Model tests failed!*\nPR: ${{ github.event.pull_request.html_url }}\nAuthor: ${{ github.event.pull_request.user.login }}\n\nAccuracy threshold or model tests did not pass. Please review before merging."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ML }}

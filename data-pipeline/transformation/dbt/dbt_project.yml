name: 'vayuguard'
version: '1.0.0'
config-version: 2

profile: 'vayuguard'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  vayuguard:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

vars:
  aqi_good_threshold: 50
  aqi_moderate_threshold: 200
  aqi_poor_threshold: 300
  aqi_severe_threshold: 400

  # Indian city coordinates for spatial analysis
  default_latitude: 28.6139
  default_longitude: 77.2090

  # Rolling window sizes (hours)
  rolling_windows: [3, 6, 12, 24, 48, 168]

  # Lag periods (hours)
  lag_periods: [1, 3, 6, 12, 24, 48, 168]

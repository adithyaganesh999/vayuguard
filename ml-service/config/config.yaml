# VayuGuard ML Service Configuration

# Service settings
service:
  name: vayuguard-ml
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000
  workers: 4
  cors_origins: "*"
  artifact_dir: "./artifacts"

# Data sources
data:
  aqi_source: "csv"  # csv or api
  weather_source: "csv"  # csv or api
  data_dir: "./data"
  cache_dir: "./cache"
  default_city: "delhi"
  supported_cities:
    - delhi
    - mumbai
    - bangalore
    - chennai
    - kolkata
    - hyderabad
    - pune
    - ahmedabad
    - jaipur
    - lucknow
  resample_frequency: "h"
  max_cache_size_mb: 500

# API keys (use environment variables in production)
api_keys:
  openaq: "${OPENAQ_API_KEY}"
  openweathermap: "${OPENWEATHERMAP_API_KEY}"

# Feature pipeline configuration
features:
  lag_periods: [1, 2, 3, 6, 12, 24, 48, 168]
  rolling_windows: [3, 6, 12, 24, 48, 168]
  include_time_features: true
  include_weather_interactions: true
  include_aqi_categories: true
  scaling_method: "standard"  # standard or minmax

# Model configurations
models:
  persistence:
    seasonal_lags: [1, 24, 168]
  
  moving_average:
    windows: [6, 12, 24, 48, 168]
    types: ["sma", "wma"]
  
  prophet:
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    holidays_prior_scale: 10.0
    seasonality_mode: "additive"
    yearly_fourier: 10
    weekly_fourier: 3
    daily_fourier: 10
    weather_regressors:
      - temperature
      - humidity
      - wind_speed
      - pressure
  
  arima:
    order: [1, 1, 1]
    seasonal_order: [1, 1, 1, 24]
    auto_arima: true
    max_p: 3
    max_q: 3
    max_d: 2
    information_criterion: "aic"
  
  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5
    reg_alpha: 0.1
    reg_lambda: 1.0
    lag_features: [1, 3, 6, 12, 24, 48]
    rolling_windows: [6, 12, 24, 48]
    cv_folds: 5
  
  lstm:
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    cell_type: "lstm"  # lstm or gru
    bidirectional: false
    use_attention: true
    lookback_window: 168
    forecast_horizon: 72
    learning_rate: 0.001
    weight_decay: 0.00001
    early_stopping_patience: 15
    batch_size: 64
    max_epochs: 100
  
  ensemble:
    strategy: "stacking"  # average, weighted, stacking, dynamic
    meta_learner: "ridge"  # ridge or elasticnet

# Forecast settings
forecast:
  default_horizon_hours: 72
  max_horizon_hours: 168
  confidence_level: 0.95
  min_history_hours: 168

# Training pipeline
training:
  test_fraction: 0.2
  validation_fraction: 0.15
  random_seed: 42
  n_jobs: -1

# Retraining schedule
retraining:
  schedule: "weekly"  # daily, weekly, monthly
  max_degradation_pct: 5.0
  auto_promote: true
  notification_webhook: null

# Monitoring
monitoring:
  drift_detection:
    enabled: true
    method: "ks"  # ks, wasserstein, psi, all
    significance_level: 0.05
    psi_threshold: 0.2
    wasserstein_threshold: 0.5
    check_interval_hours: 6
  
  accuracy_tracking:
    enabled: true
    window_size: 100
    alert_threshold_mae: 30.0
    alert_threshold_bias: 15.0
    degradation_pct: 20.0
  
  prometheus:
    enabled: true
    port: 9090

# AQI categories
aqi_categories:
  - min: 0
    max: 50
    label: "Good"
    color: "#00e400"
  - min: 51
    max: 100
    label: "Moderate"
    color: "#ffff00"
  - min: 101
    max: 150
    label: "Unhealthy for Sensitive Groups"
    color: "#ff7e00"
  - min: 151
    max: 200
    label: "Unhealthy"
    color: "#ff0000"
  - min: 201
    max: 300
    label: "Very Unhealthy"
    color: "#8f3f97"
  - min: 301
    max: 500
    label: "Hazardous"
    color: "#7e0023"

# Health risk assessment
health_risk:
  population_sensitivity:
    general: 1.0
    children: 1.3
    elderly: 1.4
    respiratory: 1.6
    athletes: 1.2
  
  activity_exposure:
    sedentary: 0.7
    light: 0.85
    moderate: 1.0
    heavy: 1.3
